<div class="min-h-screen bg-neutral-950 text-white p-6 md:p-12 font-sans selection:bg-red-600 selection:text-white">

    <div class="max-w-6xl mx-auto mb-12 flex flex-col md:flex-row md:items-center md:justify-between gap-6">
        <div>
            <h2 class="text-4xl font-extrabold tracking-wider text-red-600 uppercase mb-2">
                NETFLIX
            </h2>
            <p class="text-neutral-400 text-sm">Find your next favorite movie or TV show.</p>
        </div>

        <div class="flex items-center gap-2 w-full md:w-auto max-w-md">
            <div class="relative grow">
                <input type="text" [(ngModel)]="searchTitle" placeholder="Enter movie title..." (keyup.enter)="search()"
                    class="w-full bg-neutral-900 text-white placeholder-neutral-500 text-sm rounded-md pl-4 pr-4 py-3 border border-neutral-800 focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition duration-300" />
            </div>
            <button (click)="search()"
                class="bg-red-600 hover:bg-red-700 text-white font-medium text-sm px-6 py-3 rounded-md transition duration-300 active:scale-95 shadow-lg shadow-red-600/20">
                Search
            </button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">

        <div *ngIf="errorMessage()"
            class="bg-red-950/40 border border-red-900 text-red-400 p-4 rounded-md text-sm mb-8 animate-fade-in">
            ⚠️ {{ errorMessage() }}
        </div>

        <div *ngIf="movies().length > 0">
            <h3 class="text-xl font-semibold text-neutral-200 mb-6 tracking-wide border-l-4 border-red-600 pl-3">
                Search Results
            </h3>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-y-10 gap-x-4">
                <a *ngFor="let movie of movies()"
                   [routerLink]="['/movies', movie.imdbID]"
                   class="group relative flex flex-col bg-neutral-900 rounded-md overflow-hidden shadow-md hover:shadow-2xl transition-all duration-300 ease-out hover:-translate-y-2 cursor-pointer border border-neutral-900 hover:border-neutral-800 no-underline text-inherit">
                    
                    <div class="aspect-2/3 w-full bg-neutral-800 overflow-hidden relative">
                        <img *ngIf="movie.Poster !== 'N/A'; else noPoster" [src]="movie.Poster"
                            alt="{{ movie.Title }}"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                        
                        <ng-template #noPoster>
                            <div class="w-full h-full flex flex-col items-center justify-center p-4 bg-neutral-900 text-neutral-600 text-center">
                                <span class="text-3xl mb-2">🎬</span>
                                <span class="text-xs font-medium">No Poster Available</span>
                            </div>
                        </ng-template>

                        <div class="absolute inset-0 bg-linear-to-t from-neutral-950 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                            <div class="bg-white text-black p-2 rounded-full shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 delay-75">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-4 h-4">
                                    <path d="M8 5v14l11-7z" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="p-3 flex flex-col grow justify-between">
                        <h4 class="font-bold text-sm text-neutral-200 truncate group-hover:text-white transition-colors duration-200"
                            [title]="movie.Title">
                            {{ movie.Title }}
                        </h4>
                        <div class="flex items-center justify-between mt-1.5">
                            <span class="text-xs font-semibold px-2 py-0.5 bg-neutral-800 text-neutral-400 rounded">
                                {{ movie.Year }}
                            </span>
                            <span class="text-[11px] text-red-500 font-medium tracking-wider uppercase opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                Watch Now
                            </span>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div *ngIf="movies().length === 0 && !errorMessage()"
            class="flex flex-col items-center justify-center py-24 text-neutral-600">
            <span class="text-6xl mb-4">🍿</span>
            <p class="text-sm font-medium">The screen is empty. Type a movie name to start watching.</p>
        </div>

    </div>
</div>
